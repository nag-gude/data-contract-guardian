contract_id: network_cdr_schema_v1
warehouse: bigquery
fivetran_connector_id: ft_airtable_network
bq_project: demo-gcp-project
bq_dataset: network
bq_table: cdr
freshness:
  max_delay_minutes: 120
schema:
  required_columns:
  - cdr_id
  - subscriber_id
  - duration_seconds
  - bytes_transferred
  - charge_amount
  column_types:
    charge_amount: FLOAT
    duration_seconds: INTEGER
    bytes_transferred: INTEGER
  nullable:
    charge_amount: false
volume:
  daily_row_variance_percent: 25
semantic:
- name: non_negative_charges
  sql: SELECT COUNT(*) FROM cdr WHERE charge_amount < 0
  threshold: 0
